name: Publish package to npm

on:
  release:
    types: [published]

jobs:
  ensure-version-match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Ensure package.json version matches release tag
      - name: Verify package version matches release tag
        run: |
          RELEASE_TAG=${{ github.event.release.tag_name }}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$RELEASE_TAG" != "v$PKG_VERSION" ]; then
            echo "Error: Release tag '$RELEASE_TAG' does not match package.json version 'v$PKG_VERSION'"
            exit 1
          fi
  publish:
    needs: ensure-version-match
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test:ci
      - run: pnpm run test:package
      - name: Publish dry-run
        run: pnpm publish --dry-run
      - name: Publish to NPM
        run: pnpm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
